[families.minghu_zb.fields.seqno]
type = "UInt64"
description = "序列号,要求连续递增唯一,sh的业务序列号biz_idx,sz的委托索引app_seq_num"

[families.minghu_zb.fields.ctype]
type = "FixedString(1)"
description = "type,side,flag的合并, 1是新增限价委托,2是新增市价委托,3是新增本方最优,4是撤单,5是成交"

