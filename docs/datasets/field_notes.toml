# Handwritten field semantics. docs/_scripts/sync_reference.py validates every
# family name, dataset name, field name, and declared type against local code
# catalogs before incorporating these descriptions into fields.md.

[families.minghu_daily]
datasets = ["minghu_daily"]
summary = "明湖汇`stock_base.daily`表描述。以 `date × code` 为键。使用`get_panel()`方法取宽表时，价格字段默认乘以 `hfq`；成交量、成交额、涨跌额和涨跌幅保持原值；股票编号自动附上交易所后缀（此点对所有明湖汇数据都一样）。"

[families.minghu_daily.fields.code]
type = "String"
description = "证券代码；返回时依据 `exg` 自动补 `.SZ`、`.SH` 或 `.BJ`。"

[families.minghu_daily.fields.date]
type = "Date"
description = "交易日期。"

[families.minghu_daily.fields.exg]
type = "UInt8"
description = "交易所编码：1 为深市，2 为沪市，3 为北交所。"

[families.minghu_daily.fields.open]
type = "Nullable(Float64)"
description = "开盘价；默认按 `hfq` 后复权。"

[families.minghu_daily.fields.high]
type = "Nullable(Float64)"
description = "最高价；默认按 `hfq` 后复权。"

[families.minghu_daily.fields.low]
type = "Nullable(Float64)"
description = "最低价；默认按 `hfq` 后复权。"

[families.minghu_daily.fields.close]
type = "Nullable(Float64)"
description = "收盘价；默认按 `hfq` 后复权。"

[families.minghu_daily.fields.pclose]
type = "Nullable(Float64)"
description = "昨收价"

[families.minghu_daily.fields.change]
type = "Nullable(Float64)"
description = "涨跌额"

[families.minghu_daily.fields.pct_chg]
type = "Nullable(Float64)"
description = "涨跌幅（未复权）"

[families.minghu_daily.fields.volume]
type = "Nullable(Int64)"
description = "成交量（股）"

[families.minghu_daily.fields.amount]
type = "Nullable(Float64)"
description = "成交额"

[families.minghu_daily.fields.hfq]
type = "Nullable(Float64)"
description = "复权因子"

[families.minghu_daily.fields.ztprice]
type = "Nullable(Float64)"
description = "涨停价。"

[families.minghu_daily.fields.dtprice]
type = "Nullable(Float64)"
description = "跌停价。"

[families.minghu_daily.fields.omax_op]
type = "Nullable(Float64)"
description = "集合可申报最大价格"

[families.minghu_daily.fields.omin_op]
type = "Nullable(Float64)"
description = "集合可申报最小价格"

[families.minghu_index_daily]
datasets = ["minghu_index_daily"]
summary = "明湖汇`index_base.daily`表描述。以 `date × code` 为键，没有价格复权因子，始终返回数据库原值。"

[families.minghu_index_daily.fields.code]
type = "String"
description = "证券代码，本表涵盖了 A 股市场的核心宽基与综合指数，包括上证指数（000001）、深证成指（399001）、深证综指（399106）、深证A指（399107）、创业板指（399006）、创业板综（399102）、中小板指（399005）、科创50（000688）、北证50（899050），以及跨市场的沪深300（000300/399300）、中证500（399905）、中证500等权（000982）和中证1000（000852）指数。"

